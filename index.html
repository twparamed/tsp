<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSP 台灣醫療救護學會 | Taiwan Society of Paramedicine</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse (解析 Google Sheets) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Montserrat:wght@800;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .slogan-font { font-family: 'Montserrat', sans-serif; }
        .text-ems-orange { color: #f97316; }
        .bg-ems-orange { background-color: #f97316; }
        .text-ems-blue { color: #1d4ed8; }
        
        .hero-section {
            background-image: 
                linear-gradient(to right bottom, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.7)),
                url('https://scontent.ftpe3-1.fna.fbcdn.net/v/t39.30808-6/603759548_1164150469203863_460906377141768944_n.jpg?stp=dst-jpg_s960x960_tt6&_nc_cat=111&ccb=1-7&_nc_sid=2a1932&_nc_ohc=DRgd_JIgbJwQ7kNvwHEPaDG&_nc_oc=AdpnYKKrlDJHY4azPiw4HwTnxBGyQmv2TVgdDWn5M_9ym8x0E0E3FLMXUpqWZ2giOtLabkiK7Dcd3d7WbVBqhVoS&_nc_zt=23&_nc_ht=scontent.ftpe3-1.fna&_nc_gid=aUULHfhnv4X7ITQjbaynow&_nc_ss=7a3a8&oh=00_Af2hdoFXX_6rihQSniFHHSD8V_CcmxWuO9kKERqMd9erdg&oe=69D5F20B');
            background-size: cover;
            background-position: center 30%;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <!-- 1. Navbar 佔位符 -->
    <div id="navbar-placeholder"></div>

    <!-- 2. 影像英雄區 -->
    <section class="hero-section pt-32 pb-28 px-6 relative">
        <div class="max-w-7xl mx-auto relative z-10 flex flex-col md:flex-row items-center justify-between gap-12">
            <div class="md:w-2/3">
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded bg-white/10 backdrop-blur text-white text-[10px] font-bold mb-6 tracking-widest uppercase border border-white/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-ems-orange animate-pulse"></span>
                    Official Website
                </div>
                <h2 class="slogan-font text-5xl md:text-7xl font-black mb-6 tracking-tighter text-white leading-tight">
                    Empowering <br>
                    <span class="text-ems-orange">EMS</span> Professionals.
                </h2>
                <p id="hero-desc" class="text-lg text-slate-300 font-medium max-w-xl leading-relaxed border-l-2 border-ems-orange pl-4">
                    致力於提升台灣醫療救護專業水平，建立國際接軌的到院前緊急醫療救護體系。
                </p>
            </div>
            <div class="md:w-1/3 hidden md:flex flex-col gap-4 text-right">
                <div class="bg-slate-900/60 backdrop-blur-sm p-6 rounded border border-slate-700/50">
                    <p class="text-ems-orange font-black text-3xl slogan-font">2026</p>
                    <p class="text-xs text-slate-300 font-medium tracking-widest uppercase mt-1">Annual Conference</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. 最新動態區 (加入分類切換功能) -->
    <main class="max-w-7xl mx-auto px-6 py-24 min-h-[50vh]">
        
        <!-- 標題與按鈕區塊 -->
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 border-b border-slate-200 pb-6 gap-6">
            <h3 id="section-news" class="text-2xl font-black text-slate-900 tracking-tight flex items-center gap-3">
                <span class="w-2 h-6 bg-blue-800 rounded-sm"></span>
                最新消息 Latest News
            </h3>
            
            <!-- 分類切換按鈕 (Filters) -->
            <div class="flex flex-wrap gap-2" id="filter-buttons">
                <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-blue-800 text-white transition-colors">全部 All</button>
                <button onclick="setFilter('學會公告')" data-filter="學會公告" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">學會公告</button>
                <button onclick="setFilter('教育訓練')" data-filter="教育訓練" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">教育訓練</button>
                <button onclick="setFilter('PERIC')" data-filter="PERIC" class="filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors">PERIC</button>
            </div>
        </div>

        <!-- 卡片容器 -->
        <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 載入動畫 -->
            <div class="animate-pulse bg-white p-4 rounded-xl shadow-sm h-80 border border-slate-100 flex items-center justify-center">
                <p class="text-slate-400 font-bold text-sm tracking-widest">Loading Data...</p>
            </div>
        </div>
    </main>

    <!-- 4. Footer 佔位符 -->
    <div id="footer-placeholder"></div>

    <!-- --- 核心控制腳本 --- -->
    <script>
        // 全局狀態變數
        let lang = 'zh';
        let currentFilter = 'all'; // 預設顯示全部
        let posts = [];
        
        // Google Sheets 連結
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQfiEDEtIn6BJMw1VPnVLOps_mi2fgitOb7B8t9Wx0rEnpnuocIcvKEaGj_5q2M22la4oQPrd-tiE3N/pub?output=csv';

        // 載入外部 HTML 檔案 (Navbar & Footer)
        async function loadComponents() {
            try {
                const [navRes, footRes] = await Promise.all([
                    fetch('components/navbar.html'),
                    fetch('components/footer.html')
                ]);
                
                if(navRes.ok) document.getElementById('navbar-placeholder').innerHTML = await navRes.text();
                if(footRes.ok) document.getElementById('footer-placeholder').innerHTML = await footRes.text();

                updateLanguageUI();
            } catch (error) {
                console.error("載入導覽列或頁尾失敗", error);
            }
        }

        // 載入 Google Sheets 資料
        async function loadData() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        posts = results.data;
                        renderCards();
                    }
                });
            } catch (error) {
                console.error('資料讀取失敗:', error);
                document.getElementById('post-container').innerHTML = '<p class="text-center text-slate-500 py-10 w-full col-span-full">資料載入失敗</p>';
            }
        }

        // 設定分類過濾器
        window.setFilter = function(filterValue) {
            currentFilter = filterValue;
            
            // 更新按鈕的視覺外觀 (藍底白字 vs 灰底灰字)
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.filter === filterValue) {
                    btn.className = "filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-blue-800 text-white transition-colors";
                } else {
                    btn.className = "filter-btn px-4 py-1.5 rounded-full text-sm font-bold bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors";
                }
            });

            // 重新渲染卡片
            renderCards();
        }

        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('post-container');
            
            if (!posts || posts.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10 w-full col-span-full">尚無最新消息</p>';
                return;
            }

            // --- 執行資料過濾 ---
            // 如果目前不是選 'all'，就把資料篩選出 'committee' 欄位等於所選分類的卡片
            const filteredPosts = currentFilter === 'all' 
                ? posts 
                : posts.filter(p => p.committee === currentFilter);

            // 如果該分類沒有文章
            if (filteredPosts.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-10 w-full col-span-full font-bold">這個分類目前尚無發布資訊</p>';
                return;
            }

            // 繪製卡片
            container.innerHTML = filteredPosts.map(p => {
                const color = p.color || 'bg-blue-800';
                const tag = p.tag || '公告';
                const img = p.img || 'https://images.unsplash.com/photo-1516549655169-df83a0774514?w=800';
                
                let link = p.link ? p.link.trim() : '';
                if (link !== '' && !link.startsWith('http')) link = 'https://' + link;
                const isClickable = link !== '';
                const wrapperTag = isClickable ? 'a' : 'div';
                const hrefAttr = isClickable ? `href="${link}" target="_blank"` : '';
                
                const readMoreText = lang === 'zh' ? '閱讀全文 →' : 'Read More →';
                const readMoreHtml = isClickable ? `<div class="mt-auto pt-4 border-t border-slate-50 text-xs font-bold text-ems-blue">${readMoreText}</div>` : '';

                return `
                <${wrapperTag} ${hrefAttr} class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-100 flex flex-col h-full ${isClickable ? 'cursor-pointer' : ''}">
                    <div class="relative overflow-hidden aspect-video bg-slate-100">
                        <img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute top-3 left-3 ${color} text-white px-2.5 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider">${tag}</div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <p class="text-slate-400 font-bold text-[11px] mb-2 tracking-widest">${p.date || ''}</p>
                        <h4 class="text-lg font-bold mb-3 text-slate-900 line-clamp-2">${lang === 'zh' ? (p.title_zh || '') : (p.title_en || '')}</h4>
                        <p class="text-slate-500 text-sm font-medium line-clamp-3 mb-4 flex-grow">${lang === 'zh' ? (p.desc_zh || '') : (p.desc_en || '')}</p>
                        ${readMoreHtml}
                    </div>
                </${wrapperTag}>`;
            }).join('');
        }

        // 切換語言與更新 UI
        window.toggleLang = function() {
            lang = lang === 'zh' ? 'en' : 'zh';
            updateLanguageUI();
            renderCards(); 
        }

        function updateLanguageUI() {
            document.querySelectorAll('.lang-zh').forEach(el => el.classList.toggle('hidden', lang !== 'zh'));
            document.querySelectorAll('.lang-en').forEach(el => el.classList.toggle('hidden', lang !== 'en'));

            const ui = {
                zh: {
                    desc: "致力於提升台灣醫療救護專業水平，建立國際接軌的到院前緊急醫療救護體系。",
                    news: `<span class="w-2 h-6 bg-blue-800 rounded-sm"></span> 最新消息 Latest News`
                },
                en: {
                    desc: "Dedicated to advancing paramedicine in Taiwan and building a world-class EMS system.",
                    news: `<span class="w-2 h-6 bg-blue-800 rounded-sm"></span> Latest Updates`
                }
            };
            document.getElementById('hero-desc').innerText = ui[lang].desc;
            document.getElementById('section-news').innerHTML = ui[lang].news;
        }

        // 啟動程式
        loadComponents();
        loadData();
    </script>
</body>
</html>
