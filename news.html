<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新聞與活動 | TSP 台灣醫療救護學會</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Montserrat:wght@800;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .slogan-font { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed flex flex-col min-h-screen">

    <!-- Navbar 佔位符 -->
    <div id="navbar-placeholder"></div>

    <!-- 頁面標頭 -->
    <header class="bg-slate-900 pt-32 pb-20 px-6 relative overflow-hidden">
        <div class="absolute inset-0 opacity-20 bg-[url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=1200')] bg-cover bg-center"></div>
        <div class="max-w-5xl mx-auto relative z-10 text-center">
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight lang-zh">新聞與活動</h1>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4 tracking-tight lang-en hidden">News & Events</h1>
            <div class="w-16 h-1.5 bg-orange-500 mx-auto rounded-full"></div>
            <p class="text-slate-300 mt-6 max-w-2xl mx-auto font-medium lang-zh">掌握台灣醫療救護學會的最新公告、年度盛會、教育訓練與專案進展。</p>
            <p class="text-slate-300 mt-6 max-w-2xl mx-auto font-medium lang-en hidden">Stay updated with the latest announcements, annual conferences, training courses, and project developments.</p>
        </div>
    </header>

    <!-- 內容區 -->
    <main class="flex-grow max-w-7xl mx-auto px-6 py-16 w-full relative -mt-10 z-20">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8 md:p-12 min-h-[60vh]">
            
            <!-- 分類切換按鈕區 -->
            <div class="flex flex-wrap gap-3 mb-10 border-b border-slate-100 pb-8" id="filter-buttons">
                <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-5 py-2 rounded-full text-sm font-bold bg-blue-800 text-white transition-colors shadow-md">全部 All</button>
                <button onclick="setFilter('學會公告')" data-filter="學會公告" class="filter-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors">學會公告 News</button>
                <button onclick="setFilter('活動資訊')" data-filter="活動資訊" class="filter-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors">活動資訊 Events</button>
                <button onclick="setFilter('教育訓練')" data-filter="教育訓練" class="filter-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors">教育訓練 Training</button>
                
                <!-- 🌟 新增：媒體報導按鈕 -->
                <button onclick="setFilter('媒體報導')" data-filter="媒體報導" class="filter-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors">媒體報導 Media</button>
            </div>

            <!-- 卡片容器 -->
            <div id="post-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- 載入動畫 -->
                <div class="animate-pulse bg-slate-50 p-4 rounded-xl shadow-sm h-80 border border-slate-100 flex items-center justify-center col-span-full">
                    <p class="text-slate-400 font-bold text-sm tracking-widest">Loading Data...</p>
                </div>
            </div>

        </div>
    </main>

        <!-- 🌟 新增：彈出視窗 (Modal) 的隱藏結構 -->
    <div id="news-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 opacity-0 transition-opacity duration-300">
        <!-- 點擊背景關閉 -->
        <div class="absolute inset-0 cursor-pointer" onclick="closeModal()"></div>
        
        <!-- 視窗內容區塊 -->
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto shadow-2xl transform scale-95 transition-transform duration-300 relative z-10" id="news-modal-content">
            <!-- JavaScript 會把詳細內容塞進這裡 -->
        </div>
    </div>


    <!-- Footer 佔位符 -->
    <div id="footer-placeholder"></div>

    <!-- 核心腳本 -->
    <script>
        let lang = 'zh';
        let currentFilter = 'all';
        let posts = [];
        
        // Google Sheets 連結
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQfiEDEtIn6BJMw1VPnVLOps_mi2fgitOb7B8t9Wx0rEnpnuocIcvKEaGj_5q2M22la4oQPrd-tiE3N/pub?output=csv';

        const colorDictionary = {
            '藍': 'bg-blue-800 text-white', '橘': 'bg-orange-500 text-white',
            '綠': 'bg-emerald-600 text-white', '紅': 'bg-rose-600 text-white',
            '黃': 'bg-yellow-400 text-slate-900', '紫': 'bg-purple-600 text-white',
            '灰': 'bg-slate-600 text-white', '黑': 'bg-slate-900 text-white'
        };

// 載入 Navbar & Footer
        async function loadComponents() {
            try {
                const [navRes, footRes] = await Promise.all([
                    fetch('components/navbar.html'),
                    fetch('components/footer.html')
                ]);
                
                if(navRes.ok) {
                    const navHtml = await navRes.text();
                    document.getElementById('navbar-placeholder').innerHTML = navHtml;
                    
                    // 🚀 【關鍵修復】載入 HTML 後，立即啟動手機版按鈕功能
                    initMobileMenu(); 
                }
                
                if(footRes.ok) {
                    document.getElementById('footer-placeholder').innerHTML = await footRes.text();
                }
                
                updateLanguageUI();
            } catch (error) {
                console.error("載入組件失敗", error);
            }
        }

        // 📱 手機版選單開關邏輯
        function initMobileMenu() {
            const btn = document.getElementById('mobile-menu-button');
            const menu = document.getElementById('mobile-menu');
            
            if (btn && menu) {
                btn.addEventListener('click', () => {
                    // 切換 hidden 類別來顯示/隱藏選單
                    menu.classList.toggle('hidden');
                });
            }
        }
        async function loadData() {
            try {
                const response = await fetch(sheetUrl);
                const csvText = await response.text();
                Papa.parse(csvText, {
                    header: true, skipEmptyLines: true,
                    complete: function(results) {
                        posts = results.data;
                        renderCards();
                    }
                });
            } catch (error) {
                document.getElementById('post-container').innerHTML = '<p class="text-center text-slate-500 py-10 w-full col-span-full">資料載入失敗</p>';
            }
        }

        window.setFilter = function(filterValue) {
            currentFilter = filterValue;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.dataset.filter === filterValue) {
                    btn.className = "filter-btn px-5 py-2 rounded-full text-sm font-bold bg-blue-800 text-white transition-colors shadow-md";
                } else {
                    btn.className = "filter-btn px-5 py-2 rounded-full text-sm font-bold bg-slate-50 border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors";
                }
            });
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById('post-container');
            if (!posts || posts.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-20 w-full col-span-full font-bold">目前尚無資料</p>';
                return;
            }

            const filteredPosts = currentFilter === 'all' ? posts : posts.filter(p => p.committee === currentFilter);

            if (filteredPosts.length === 0) {
                container.innerHTML = '<div class="text-center py-20 w-full col-span-full"><p class="text-slate-400 font-bold text-lg mb-2">這個分類目前尚無發布資訊</p><p class="text-slate-400 text-sm">請點擊其他分類查看最新消息。</p></div>';
                return;
            }

            container.innerHTML = filteredPosts.map(p => {
                const rawColor = p.color ? p.color.trim() : '';
                const tagTheme = colorDictionary[rawColor] || 'bg-blue-800 text-white';
                const tag = p.tag || '公告';
                const img = p.img || 'https://images.unsplash.com/photo-1516549655169-df83a0774514?w=800';
                
                let link = p.link ? p.link.trim() : '';
                if (link !== '' && !link.startsWith('http')) link = 'https://' + link;
                const isClickable = link !== '';
                const wrapperTag = isClickable ? 'a' : 'div';
                const hrefAttr = isClickable ? `href="${link}" target="_blank"` : '';
                
                const readMoreText = lang === 'zh' ? '閱讀全文 →' : 'Read More →';
                const readMoreHtml = isClickable ? `<div class="mt-auto pt-4 border-t border-slate-50 text-xs font-bold text-orange-500">${readMoreText}</div>` : '';

                return `
                <${wrapperTag} ${hrefAttr} class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-200 flex flex-col h-full ${isClickable ? 'cursor-pointer' : ''}">
                    <div class="relative overflow-hidden aspect-video bg-slate-100">
                        <img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                        <div class="absolute top-4 left-4 ${tagTheme} px-3 py-1 rounded shadow-lg shadow-black/20 text-xs font-black uppercase tracking-widest z-10 backdrop-blur-sm">
                            ${tag}
                        </div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <p class="text-slate-400 font-bold text-[11px] mb-2 tracking-widest">${p.date || ''}</p>
                        <h4 class="text-lg font-bold mb-3 text-slate-900 line-clamp-2 leading-snug">${lang === 'zh' ? (p.title_zh || '') : (p.title_en || '')}</h4>
                        <p class="text-slate-500 text-sm font-medium line-clamp-3 mb-4 flex-grow">${lang === 'zh' ? (p.desc_zh || '') : (p.desc_en || '')}</p>
                        ${readMoreHtml}
                    </div>
                </${wrapperTag}>`;
            }).join('');
        }

        window.toggleLang = function() {
            lang = lang === 'zh' ? 'en' : 'zh';
            updateLanguageUI();
            renderCards(); 
        }

        function updateLanguageUI() {
            document.querySelectorAll('.lang-zh').forEach(el => el.classList.toggle('hidden', lang !== 'zh'));
            document.querySelectorAll('.lang-en').forEach(el => el.classList.toggle('hidden', lang !== 'en'));
        }

        loadComponents();
        loadData();
    </script>
</body>
</html>
